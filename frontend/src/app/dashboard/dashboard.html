 <nav class="navbar">

    <button routerLink="/dashboard">
         Dashboard
    </button>

    <button routerLink="/proyectos">
         Proyectos
    </button>

    <button routerLink="/clientes">
         Clientes
    </button>
<button class="logout" (click)="logout()">
     Salir
</button>
</nav>

<div class="dashboard-container">

    <div class="topbar">
        <h2>Sistema de Gestión de Proyectos</h2>
        <span>Usuario  verificado</span>
    </div>

    <h1>Panel Principal</h1>

    <p>OPCIONES DE ADMINISTRADOR</p>

    <div class="menu">

        <button routerLink="/clientes">
            Clientes
        </button>

        <button routerLink="/proyectos">
         Proyectos
        </button>

        <button routerLink="/tareas">
            Tareas
        </button>

    </div>

    <div class="acciones">

        <button class="pdf-btn" (click)="exportarProyectosAPDF()">
            Exportar PDF
        </button>

        <button class="logout-btn" (click)="logout()">
            Cerrar sesión
        </button>

    </div>

</div>

<div class="estadisticas">

    <div class="card">
        <h2>{{ proyectosTotales }}</h2>
        <p>Proyectos Totales</p>
    </div>

    <div class="card activo">
        <h2>{{ proyectosActivos }}</h2>
        <p>Proyectos Activos</p>
    </div>

    <div class="card finalizado">
        <h2>{{ proyectosFinalizados }}</h2>
        <p>Proyectos Finalizados</p>
    </div>

    <div class="card cliente">
        <h2>{{ clientesTotales }}</h2>
        <p>Clientes Registrados</p>
    </div>

</div>
