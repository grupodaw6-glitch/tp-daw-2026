<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Sistema de Gestión de Proyectos</h2>
    </div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" [(ngModel)]="nombre" placeholder="Ingrese su usuario" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="clave" placeholder="Ingrese su contraseña" />
    </div>

    <button class="login-btn" (click)="login()">Ingresar</button>

    <div class="footer-text">Trabajo Integrador DAW 2026</div>
  </div>
</div>
